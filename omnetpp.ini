# omnetpp.ini

[General]
network = BNetwork
sim-time-limit = 1000s

# Configuration for a simulation with NO packet loss
[Config NoLoss]
description = "Go-Back-N without any packet loss"
*.Tic.dataRate = 10000bps
*.Tic.packetLossRate = 0.0
*.Tic.seqNumBits = 3         # Sequence numbers will be 0..7
*.Toc.windowSize = 4         # W = 4
*.Toc.ackFrequency = 2       # N = 2 (Send ACK after every 2 packets)
*.Toc.bufferSize = 5


# Configuration for a simulation WITH packet loss
[Config WithLoss]
description = "Go-Back-N with 20% packet loss"
*.Tic.dataRate = 10000bps
*.Tic.packetLossRate = 0.2   # 20% of packets will be "lost"
*.Tic.seqNumBits = 3         # Sequence numbers will be 0..7
*.Toc.windowSize = 4         # W = 4
*.Toc.ackFrequency = 2       # N = 2
*.Toc.bufferSize = 5